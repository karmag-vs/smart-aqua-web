<!DOCTYPE html>
<html>
  <head>
    <title>ESP Smart Aqua CS - ALARM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="aqua.svg">
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <div id="nav-placeholder"></div>  <div class="content">
        <div id="alarmTableContainer">
            Načítám aktuální alarmy z ESP32...
        </div>
    </div>    
    
    <div id="footer-placeholder"></div>  
    
  <script>
    // Definice textů a barev alarmů
    const alarmTexts = {
      "0": { text: "BEZ PORUCHY", color: "Green", icon: "fas fa-fish" },
      "1": { text: "VODA T: NÍZKÁ!", color: "Orange", icon: "fas fa-thermometer-empty" },
      "2": { text: "VODA T: VYSOKÁ!", color: "Orange", icon: "fas fa-thermometer-full" },
      "3": { text: "VODA T: SNÍMAČ DS18B20 NOK!", color: "Red", icon: "fas fa-exclamation-circle" },
      "4": { text: "VODA PH: NÍZKÉ!", color: "Orange", icon: "fas fa-leaf" },
      "5": { text: "VODA PH: VYSOKÉ!", color: "Orange", icon: "fas fa-leaf" },
      "6": { text: "VODA PH: PH-4502C NOK!", color: "Red", icon: "fas fa-exclamation-circle" },
      "7": { text: "VODA L: NÍZKÁ!", color: "Orange", icon: "fas fa-arrow-alt-circle-down" },
      "8": { text: "VODA L: VYSOKÁ!", color: "Orange", icon: "fas fa-arrow-alt-circle-down" },
      "9": { text: "VODA L: A02YYUW NOK!", color: "Red", icon: "fas fa-exclamation-circle" },
     "10": { text: "FILTR Q: NÍZKÝ!", color: "Orange", icon: "fas fa-spinner" },
     "11": { text: "FILTR Q: VYSOKÝ!", color: "Orange", icon: "fas fa-spinner" },
     "12": { text: "FILTR Q: YFS201 NOK!", color: "Red", icon: "fas fa-exclamation-circle" },
     "13": { text: "KRYT T: PŘEKROČENA!", color: "Orange", icon: "fas fa-thermometer-full" },
     "14": { text: "KRYT H: PŘEKROČENA!", color: "Orange", icon: "fas fa-tint" },
     "15": { text: "KRYT: DTH22!", color: "Red", icon: "fas fa-exclamation-circle" },
     "16": { text: "KRMÍTKO: PRÁZDNÉ", color: "Yellow", icon: "fas fa-fish" },
     "17": { text: "KRMÍTKO: OFFLINE", color: "Yellow", icon: "fas fa-fish" },
     "18": { text: "DÁVKOVÁNÍ: PRÁZDNÉ", color: "Brown", icon: "fas fa-vial" },
     "19": { text: "RTC ERROR!", color: "White", icon: "fa-clock" },
     "20": { text: "PROBLÉM S SD KARTOU!!!", color: "White", icon: "fas fa-sd-card" },
     "21": { text: "PROBLÉM S FS PAMĚTÍ!!!", color: "White", icon: "fas fa-microchip" },
     "22": { text: "RESTART", color: "White", icon: "fa-power-off" },
     "23": { text: "", color: "Green", icon: "fas fa-fish" },
     "24": { text: "", color: "Green", icon: "fas fa-fish" }
    };

    // Nová funkce pro sestavení tabulky, kterou zavolá script.js, jakmile dorazí MQTT zpráva
    function vykresliAlarmy(json) {
        const container = document.getElementById("alarmTableContainer");
        if (!container) return;

        let html = `<table>
            <thead>
                <tr>
                    <th style="width: 25%;">Čas</th>
                    <th style="width: 15%;">Stav</th>
                    <th>Popis poruchy</th>
                </tr>
            </thead>
            <tbody>`;

        if (json.d && json.d.length > 0) {
            json.d.forEach(row => {
                // Formátování data dd.mm.yy hh:mm
                const d = new Date(row.t * 1000);
                const dateStr = `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getFullYear()).slice(-2)} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                
                // Určení ikony stavu (1=START, 2=STOP)
                const statusIcon = (row.s === 1) 
                    ? '<i class="fas fa-caret-right" style="color: #ff4444;" title="Vznik"></i>' 
                    : '<i class="fas fa-caret-left" style="color: #44ff44;" title="Konec"></i>';
                
                const info = alarmTexts[row.n.toString()] || { text: "Neznámý ID: " + row.n, color: "red", icon: "fa-exclamation" };

                html += `<tr>
                    <td style="font-size: 0.8rem; color: #aaa;">${dateStr}</td>
                    <td style="text-align: center;">${statusIcon}</td>
                    <td style="text-align: left; padding-left: 10px;">
                        <span style="color:${info.color}; font-weight:600;">
                            <i class="fas ${info.icon}"></i> ${info.text}
                        </span>
                    </td>
                </tr>`;
            });
        } else {
            html += '<tr><td colspan="3">Žádné záznamy o poruchách</td></tr>';
        }

        html += "</tbody></table>";
        container.innerHTML = html;
    }

    // Vyžádání dat hned po spuštění (pokud už MQTT běží)
    function getAlarms() {
        const heslo = sessionStorage.getItem('mqtt-heslo');
        if (typeof client !== 'undefined' && client && client.connected && heslo) {
            console.log("Posílám MQTT požadavek na alarmy...");
            client.publish(`smart_aqua_cs/${heslo}/pozadavek`, 'getAlarmLogs');
        }
    }

    // Zkusíme poslat požadavek při načtení (s malým zpožděním, aby stihl naběhnout klient ze script.js)
    window.addEventListener('load', () => {
        setTimeout(getAlarms, 1000);
    });
  </script>  
  </body>
</html>
