<!DOCTYPE html>
<html>
  <head>
    <title>ESP Aqua CS - PH WATER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="aqua.svg">
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <div id="nav-placeholder"></div>  <!-- navigacni menu -->
     
    <div class="content">
        <div class="cards">
        
            <div class="card">
                <div class="card-row icon-row">
                    <i class="fas fa-leaf" style="color:Green;"></i>
                </div>
                
                <div class="card-row label-row">
                    <span class="label-text">PH VODA</span>
                    <span id="statusPH" class="status-badge">--</span>
                </div> 
                       
                <div class="reading">  
                    <span style="color:Gray;" id="SPphWater">--</span> / 
                    <span id="phWater">--</span></span>
                </div>
            </div>

            <div class="card"> 
                <p><i class="fas fa-water" style="color:DodgerBlue;"></i>
                    dKH / CO2
                    <span class="reading">
                    <span id="dKH">--</span> ° / 
                    <span id="co2W">--</span></span>
                </p>                
            </div>
            <button class="btn-action grid-btn" onclick="openPhControlModal()">
                <i class="fas fa-sliders-h"></i> OVLÁDÁNÍ
            </button>
            
            <button class="btn-action grid-btn" onclick="openChart(3)">
                <i class="fas fa-chart-line"></i> HISTORIE (GRAF)
            </button>
            
            <button class="btn-action grid-btn" onclick="openSensorSettings(3, 'phWater', ['inst','enAlm','req','act','cal','hys','min','max'])">
                <i class="fas fa-cog"></i> NASTAVENÍ 
            </button>
            
            <button class="btn-action grid-btn" onclick="openSchedulerModal(3)"> 
                <i class="fas fa-calendar-alt"></i> PLÁNOVAČ
            </button>
        </div>
    </div>
    
    <div id="phControlModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-leaf"></i>&nbsp;<span>OVLÁDÁNÍ CO2</span>
                </h3>
                <div class="modal-controls">
                    <button onclick="document.getElementById('phControlModal').style.display='none'" class="btn-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div class="modal-body" style="text-align: center;">
                <p>Režim CO2 ventilu:</p>
            </div>

            <div class="mode-selector">
                <button id="btnPhMode0" class="mode-btn" onclick="setPhMode(0)">VYP</button>
                <button id="btnPhMode1" class="mode-btn" onclick="setPhMode(1)">ZAP</button>
                <button id="btnPhMode2" class="mode-btn" onclick="setPhMode(2)">AUTO</button>
            </div>
        </div>
    </div>
        
    <div id="modals-placeholder"></div>
    <div id="footer-placeholder"></div>  
    
    <script>
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = "none";
            }
        }
    </script> 
  </body>
</html>
